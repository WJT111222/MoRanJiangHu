<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>墨色江湖更新日志</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11100d;
      --panel: #1d1812;
      --paper: #f2e3bf;
      --ink: #f9f0d2;
      --muted: #bda878;
      --gold: #d9aa52;
      --line: rgba(217, 170, 82, 0.28);
      --green: #7dd3a7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, rgba(217, 170, 82, 0.16), transparent 34rem), linear-gradient(180deg, #17130f 0%, var(--bg) 45%, #070706 100%);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
      line-height: 1.75;
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 8px;
      font-family: "KaiTi", "STKaiti", serif;
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.15;
      letter-spacing: 0.08em;
    }

    .summary {
      max-width: 760px;
      color: var(--muted);
      font-size: 15px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a { color: inherit; }

    .btn {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--line);
      background: rgba(217, 170, 82, 0.08);
      padding: 8px 14px;
      color: var(--gold);
      text-decoration: none;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .btn:hover {
      border-color: rgba(217, 170, 82, 0.58);
      background: rgba(217, 170, 82, 0.14);
    }

    .status {
      margin-top: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .latest {
      margin: 28px 0;
      border: 1px solid rgba(125, 211, 167, 0.34);
      background: rgba(30, 73, 50, 0.22);
      padding: 22px;
    }

    .latest h2,
    .history h2 {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 20px;
      letter-spacing: 0.08em;
    }

    .entry {
      margin-top: 16px;
      border: 1px solid var(--line);
      background: rgba(29, 24, 18, 0.76);
      padding: 18px;
    }

    .entry-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .version {
      color: var(--paper);
      font-size: 20px;
      font-weight: 700;
    }

    .code,
    time {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
    }

    ul {
      margin: 12px 0 0;
      padding-left: 1.25em;
    }

    li + li { margin-top: 8px; }

    footer {
      margin-top: 40px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="eyebrow">bacon159 fan edition</div>
      <h1>墨色江湖更新日志</h1>
      <p class="summary">这里会读取当前发布清单并展示最新版本与历史版本。以后只需要收藏这个固定页面，就能查看网页端与 APK 的最新更新内容。</p>
      <div class="links">
        <a class="btn" href="https://msjh.bacon159.pp.ua/">进入主域名</a>
        <a class="btn" href="https://msjh.bacon.de5.net/">进入备用域名</a>
        <a class="btn" href="https://download.bacon.de5.net/moranjianghu/latest.apk">下载最新版 APK</a>
      </div>
      <div id="status" class="status">正在读取更新清单...</div>
    </header>

    <section id="latest" class="latest" hidden></section>
    <section class="history">
      <h2>历史版本</h2>
      <div id="history"></div>
    </section>

    <footer>
      如遇主域名无法访问，可改用备用域名；GitHub 同步能力依赖 GitHub 网络连通性。
    </footer>
  </main>

  <script>
    const releaseInfoUrl = '/release-info.json';
    const statusNode = document.getElementById('status');
    const latestNode = document.getElementById('latest');
    const historyNode = document.getElementById('history');

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    const formatTime = (value) => {
      if (!value) return '发布时间待补充';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(date);
    };

    const renderEntry = (entry) => {
      const changes = Array.isArray(entry.changes) && entry.changes.length > 0 ? entry.changes : ['该版本已发布，详细内容整理中。'];
      return `
        <article class="entry">
          <div class="entry-title">
            <span class="version">v${escapeHtml(entry.versionName || '未知版本')}</span>
            ${entry.versionCode ? `<span class="code">CODE ${escapeHtml(entry.versionCode)}</span>` : ''}
            <time>${escapeHtml(formatTime(entry.publishedAt || entry.published_at || entry.releasePublishedAt))}</time>
          </div>
          <ul>${changes.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
        </article>
      `;
    };

    const normalizeManifest = (manifest) => {
      const latest = {
        versionName: manifest.versionName,
        versionCode: manifest.versionCode,
        publishedAt: manifest.publishedAt || manifest.releasePublishedAt,
        changes: manifest.changes || manifest.releaseNotes || []
      };
      const history = Array.isArray(manifest.history) ? manifest.history : Array.isArray(manifest.releaseHistory) ? manifest.releaseHistory : [];
      return { latest, history };
    };

    fetch(releaseInfoUrl, { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((manifest) => {
        const { latest, history } = normalizeManifest(manifest);
        latestNode.hidden = false;
        latestNode.innerHTML = `<h2>最新版本</h2>${renderEntry(latest)}`;
        historyNode.innerHTML = history.length > 0 ? history.map(renderEntry).join('') : '<article class="entry">暂无更多历史版本。</article>';
        statusNode.textContent = `已同步站内更新清单：v${latest.versionName || '未知版本'}`;
      })
      .catch((error) => {
        statusNode.textContent = `更新清单读取失败：${error.message || error}`;
        historyNode.innerHTML = '<article class="entry">请稍后刷新，或直接下载最新版 APK。</article>';
      });
  </script>
</body>
</html>
