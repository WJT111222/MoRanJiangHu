<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CNB 提交弹窗示意图</title>
  <desc id="desc">展示修改自定义下载链接.yaml 后，在提交弹窗中填写描述并点击提交。</desc>
  <rect width="1280" height="720" fill="#f4f4f3"/>
  <rect width="1280" height="720" fill="#000" opacity=".48"/>
  <rect x="96" y="64" width="1088" height="592" rx="10" fill="#fff" opacity=".78"/>
  <rect x="126" y="96" width="1030" height="50" rx="6" fill="#f7f7f7"/>
  <text x="154" y="128" fill="#2f3437" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">comfyui-ql / 自定义下载链接.yaml</text>
  <rect x="126" y="170" width="1030" height="392" rx="6" fill="#fbfbfb" stroke="#ddd"/>
  <text x="154" y="205" fill="#58a04d" font-family="Consolas, monospace" font-size="17"># 一个模型一行，模型路径: 下载链接</text>
  <text x="154" y="245" fill="#1f6fb2" font-family="Consolas, monospace" font-size="17">models/diffusion_models/mPMix_NSFW_V9_fp8.safetensors: https://cnb.cool/...</text>
  <text x="154" y="285" fill="#1f6fb2" font-family="Consolas, monospace" font-size="17">models/text_encoders/qwen_3_4b.safetensors: https://cnb.cool/...</text>
  <text x="154" y="325" fill="#1f6fb2" font-family="Consolas, monospace" font-size="17">models/vae/ae.safetensors: https://cnb.cool/...</text>
  <rect x="390" y="126" width="500" height="464" rx="10" fill="#fff" stroke="#d9d9d9"/>
  <text x="420" y="176" fill="#111" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">提交</text>
  <text x="420" y="226" fill="#333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">描述</text>
  <rect x="420" y="242" width="420" height="40" rx="5" fill="#fff" stroke="#d9d9d9"/>
  <text x="436" y="268" fill="#333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">编辑文件 自定义下载链接.yaml</text>
  <text x="420" y="334" fill="#333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">额外说明</text>
  <rect x="420" y="350" width="420" height="106" rx="5" fill="#fff" stroke="#d9d9d9"/>
  <circle cx="430" cy="496" r="8" fill="#fff" stroke="#ff6a00" stroke-width="2"/>
  <circle cx="430" cy="496" r="4" fill="#ff6a00"/>
  <text x="448" y="502" fill="#111" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">直接提交到 main 分支</text>
  <circle cx="430" cy="532" r="8" fill="#fff" stroke="#d9d9d9" stroke-width="2"/>
  <text x="448" y="538" fill="#333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">为这次提交创建一个新分支</text>
  <rect x="420" y="560" width="58" height="38" rx="6" fill="#ff6a00"/>
  <text x="449" y="584" fill="#fff" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700">提交</text>
  <rect x="490" y="560" width="58" height="38" rx="6" fill="#fff" stroke="#d9d9d9"/>
  <text x="519" y="584" fill="#333" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16">取消</text>
  <path d="M496 604 L448 586" stroke="#ff6a00" stroke-width="4" stroke-linecap="round"/>
  <path d="M448 586 l18 -4 M448 586 l10 15" stroke="#ff6a00" stroke-width="4" stroke-linecap="round"/>
  <text x="515" y="620" fill="#ff6a00" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700">填好描述后点击提交</text>
</svg>
