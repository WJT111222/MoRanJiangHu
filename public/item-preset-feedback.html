<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>墨色江湖物品图反馈</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f8f1df;
      --ink: #2b2118;
      --muted: #746654;
      --line: #d8c39d;
      --ok: #198754;
      --bad: #b42318;
      --surface: #efe2c5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: var(--surface);
      color: var(--ink);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(248, 241, 223, .97);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      box-shadow: 0 2px 12px rgba(79, 53, 22, .08);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 0; }
    .tab {
      height: 34px;
      border-radius: 999px;
      padding: 0 16px;
      border: 1px solid var(--line);
      background: #fff7e8;
      color: var(--muted);
    }
    .tab.active { background: #5f3f18; border-color: #5f3f18; color: #fffaf0; }
    input, select, button, textarea {
      border: 1px solid var(--line);
      background: #fffaf0;
      color: var(--ink);
      border-radius: 6px;
      font: inherit;
    }
    input, select, button { height: 36px; padding: 0 10px; }
    button { cursor: pointer; }
    button:hover { border-color: #a98542; }
    .primary { background: #5f3f18; color: #fffaf0; border-color: #5f3f18; }
    .primary:disabled { opacity: .55; cursor: not-allowed; }
    .stat { color: var(--muted); font-size: 14px; }
    main { padding: 18px; }
    .intro {
      max-width: 980px;
      margin-bottom: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .panel {
      display: grid;
      grid-template-columns: minmax(180px, 280px) minmax(240px, 1fr);
      gap: 10px;
      max-width: 980px;
      margin-bottom: 16px;
    }
    .panel input, .panel textarea { width: 100%; padding: 8px 10px; }
    .panel textarea { min-height: 76px; resize: vertical; grid-column: 1 / -1; }
    .contribution {
      max-width: 980px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff7e8;
      padding: 12px;
      display: none;
    }
    .contribution.open { display: block; }
    .contribution h2 { margin: 0 0 10px; font-size: 18px; }
    .contribution-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 10px;
    }
    .contribution-grid input, .contribution-grid select, .contribution-grid textarea { width: 100%; }
    .contribution-grid textarea { min-height: 72px; padding: 8px 10px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(178px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(79, 53, 22, .08);
    }
    .card.problem { outline: 3px solid rgba(180, 35, 24, .35); }
    .imgbox {
      aspect-ratio: 1 / 1;
      background: #fff9ec;
      display: grid;
      place-items: center;
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .imgbox img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #fff7e8;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      color: var(--muted);
    }
    .fail { color: #842029; font-size: 14px; padding: 8px; text-align: center; }
    .loading { color: #8f6d3b; font-size: 13px; padding: 8px; text-align: center; }
    .meta { padding: 10px; display: grid; gap: 6px; }
    .name { font-weight: 700; font-size: 16px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }
    .tag { border: 1px solid var(--line); border-radius: 999px; padding: 2px 7px; background: #fff7e8; }
    .note { width: 100%; min-height: 54px; resize: vertical; padding: 6px; }
    .mark {
      height: 32px;
      font-size: 13px;
    }
    .mark.active { background: #fde2df; border-color: var(--bad); color: #842029; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: min(680px, calc(100vw - 24px));
      background: #fffaf0;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(79, 53, 22, .18);
      padding: 10px 14px;
      display: none;
      white-space: pre-wrap;
    }
    .viewer {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(32, 24, 16, .72);
      padding: 24px;
    }
    .viewer.open { display: flex; }
    .viewer-inner {
      max-width: min(92vw, 920px);
      max-height: 92vh;
      background: #fffaf0;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, .32);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      font-weight: 700;
    }
    .viewer-close {
      width: 40px;
      min-width: 40px;
      height: 40px;
      border-radius: 999px;
      background: #b42318;
      color: #fff;
      border-color: #fff;
      font-size: 22px;
      line-height: 1;
      box-shadow: 0 0 0 2px rgba(180, 35, 24, .25);
    }
    .viewer-img-wrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 12px;
      background: #efe2c5;
    }
    .viewer img {
      max-width: 100%;
      max-height: calc(92vh - 86px);
      object-fit: contain;
      display: block;
    }
    @media (max-width: 640px) {
      .panel { grid-template-columns: 1fr; }
      .contribution-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1>墨色江湖物品图反馈</h1>
  <div class="toolbar">
    <input id="q" placeholder="搜索名称，例如 精钢鞋 / 草鞋 / 钢刀" />
    <select id="type"><option value="">全部类型</option></select>
    <select id="filter"><option value="">全部</option><option value="problem">只看已标问题</option><option value="todo">只看未标</option></select>
    <select id="source"><option value="">全部来源</option><option value="本地">本地</option><option value="远程图">远程图</option></select>
    <button id="submitBtn" class="primary">提交反馈</button>
    <button id="toggleContributionBtn">贡献图片</button>
    <button id="clearBtn">清空本机标记</button>
    <span class="stat" id="stat">载入中...</span>
  </div>
  <div class="tabs" id="tabs" role="tablist" aria-label="预设图分类"></div>
</header>
<main>
  <div class="intro">
    请只标记你认为“图像和物品名称对不上”的条目，并在备注里写清问题，例如“像盔甲不是鞋”“像整把剑不是残卷”“文字太明显”。提交后维护者会按反馈重新生成或替换。
  </div>
  <div class="panel">
    <input id="reviewer" placeholder="称呼，可不填" />
    <input id="contact" placeholder="联系方式，可不填" />
    <textarea id="summary" placeholder="总体反馈，可不填"></textarea>
  </div>
  <section id="contributionPanel" class="contribution" aria-label="贡献物品预设图">
    <h2>贡献自己生成的物品图</h2>
    <div class="intro">
      上传后会先进入临时审核区，不会直接进入正式预设图库。每个浏览器/设备每天最多提交 100 张；提交成功后会返回贡献编号，维护者审核后再转入图床或清理。
    </div>
    <div class="contribution-grid">
      <input id="contributionName" placeholder="物品名称，例如 玉骨扇" />
      <select id="contributionType">
        <option value="">选择类型</option>
        <option>武器</option><option>防具</option><option>鞋履</option><option>饰品</option><option>秘籍</option><option>丹药</option><option>材料</option><option>杂物</option><option>法宝</option><option>符箓</option><option>阵盘</option>
      </select>
      <select id="contributionQuality">
        <option value="">选择品质</option>
        <option>普通</option><option>精良</option><option>稀有</option><option>史诗</option><option>传说</option><option>绝世</option><option>神话</option>
      </select>
      <input id="contributorName" placeholder="贡献者称呼，可不填" />
      <input id="contributorContact" placeholder="联系方式，可不填" />
      <input id="contributionFile" type="file" accept="image/png,image/jpeg,image/webp" />
      <textarea id="contributionNote" class="full" placeholder="备注，可写生成模型、提示词重点或为什么适合这个物品"></textarea>
      <button id="submitContributionBtn" class="primary" type="button">提交贡献图片</button>
      <span class="stat" id="contributionStat"></span>
    </div>
  </section>
  <div class="grid" id="grid"></div>
</main>
<div class="toast" id="toast"></div>
<div class="viewer" id="viewer" aria-hidden="true">
  <div class="viewer-inner" role="dialog" aria-modal="true" aria-label="物品图放大预览">
    <div class="viewer-head">
      <span id="viewerTitle">物品图预览</span>
      <button id="viewerClose" class="viewer-close" type="button" aria-label="关闭预览">×</button>
    </div>
    <div class="viewer-img-wrap">
      <img id="viewerImg" alt="" />
    </div>
  </div>
</div>
<script>
const storageKey = 'msjh-public-item-preset-feedback-v1';
const categoryOrder = ['武侠', '仙侠', '西方奇幻', '灵气复苏', '都市修仙', '现代都市', '末日丧尸'];
let items = [];
let activeCategory = categoryOrder[0];
let marks = JSON.parse(localStorage.getItem(storageKey) || '{}');
const grid = document.getElementById('grid');
const q = document.getElementById('q');
const type = document.getElementById('type');
const filter = document.getElementById('filter');
const source = document.getElementById('source');
const stat = document.getElementById('stat');
const toast = document.getElementById('toast');
const submitBtn = document.getElementById('submitBtn');
const toggleContributionBtn = document.getElementById('toggleContributionBtn');
const contributionPanel = document.getElementById('contributionPanel');
const submitContributionBtn = document.getElementById('submitContributionBtn');
const contributionStat = document.getElementById('contributionStat');
const tabs = document.getElementById('tabs');
const viewer = document.getElementById('viewer');
const viewerTitle = document.getElementById('viewerTitle');
const viewerImg = document.getElementById('viewerImg');
const viewerClose = document.getElementById('viewerClose');

function save() { localStorage.setItem(storageKey, JSON.stringify(marks)); }
function itemKey(item) { return item.id || `${item.category || '武侠'}:${item.name}`; }
function showToast(message) {
  toast.textContent = message;
  toast.style.display = 'block';
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => { toast.style.display = 'none'; }, 5000);
}
function getContributionDeviceId() {
  const key = 'msjh-item-preset-contribution-device-id';
  let value = localStorage.getItem(key);
  if (!value) {
    value = (crypto.randomUUID && crypto.randomUUID()) || `device-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    localStorage.setItem(key, value);
  }
  return value;
}
function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(new Error('读取图片失败'));
    reader.readAsDataURL(file);
  });
}
function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = text;
  return node;
}
function openViewer(item) {
  viewerTitle.textContent = item.name;
  viewerImg.src = item.src;
  viewerImg.alt = item.name;
  viewer.classList.add('open');
  viewer.setAttribute('aria-hidden', 'false');
}
function closeViewer() {
  viewer.classList.remove('open');
  viewer.setAttribute('aria-hidden', 'true');
  viewerImg.removeAttribute('src');
}
const maxConcurrentImageLoads = Number.POSITIVE_INFINITY;
let activeImageLoads = 0;
const imageLoadQueue = [];
const queuedImages = new WeakSet();
function imageUrlForAttempt(url, attempt) {
  if (!attempt) return url;
  return `${url}${url.includes('?') ? '&' : '?'}retry=${attempt}`;
}
function setImageStatus(imgbox, className, text) {
  if (!imgbox) return;
  imgbox.querySelectorAll('.loading,.fail').forEach(node => node.remove());
  if (text) imgbox.appendChild(el('div', className, text));
}
function enqueueImageLoad(img, imgbox, item, attempt = 0) {
  if (!img || !imgbox || !item || img.dataset.loaded === '1') return;
  if (queuedImages.has(img) && attempt === Number(img.dataset.attempt || 0)) return;
  img.dataset.attempt = String(attempt);
  queuedImages.add(img);
  imageLoadQueue.push({ img, imgbox, item, attempt });
  pumpImageLoadQueue();
}
function pumpImageLoadQueue() {
  while (activeImageLoads < maxConcurrentImageLoads && imageLoadQueue.length) {
    const task = imageLoadQueue.shift();
    const { img, imgbox, item, attempt } = task;
    if (!img.isConnected || img.dataset.loaded === '1') continue;
    queuedImages.delete(img);
    activeImageLoads += 1;
    setImageStatus(imgbox, 'loading', attempt > 0 ? `图片重试中（${attempt}/4）` : '图片加载中');
    img.onload = () => {
      activeImageLoads = Math.max(0, activeImageLoads - 1);
      img.dataset.loaded = '1';
      setImageStatus(imgbox, '', '');
      pumpImageLoadQueue();
    };
    img.onerror = () => {
      activeImageLoads = Math.max(0, activeImageLoads - 1);
      img.removeAttribute('src');
      if (attempt < 4 && img.isConnected) {
        const delay = Math.min(12000, 1200 * (2 ** attempt));
        setImageStatus(imgbox, 'loading', `图片稍后重试（${attempt + 1}/4）`);
        window.setTimeout(() => enqueueImageLoad(img, imgbox, item, attempt + 1), delay);
      } else {
        setImageStatus(imgbox, 'fail', '图片加载失败，滚动停留后可刷新重试');
        if (!imgbox.querySelector('.badge')) imgbox.appendChild(el('span', 'badge', item.source));
      }
      pumpImageLoadQueue();
    };
    img.src = imageUrlForAttempt(item.src, attempt);
  }
}
function watchPresetImage(img, imgbox, item) {
  img.__presetItem = item;
  enqueueImageLoad(img, imgbox, item, 0);
}
function currentProblemItems() {
  return items
    .filter(item => (item.category || '武侠') === activeCategory)
    .filter(item => (marks[itemKey(item)] || {}).problem)
    .map(item => ({
      id: itemKey(item),
      category: item.category || activeCategory,
      name: item.name,
      type: item.type,
      quality: item.quality,
      source: item.source,
      note: (marks[itemKey(item)] || {}).note || ''
    }))
    .filter(item => item.note.trim());
}
function scopedItemsForActiveCategory() {
  return items.filter(item => (item.category || '武侠') === activeCategory);
}
function renderTabs() {
  tabs.textContent = '';
  const availableCategories = new Set(items.map(item => item.category || '武侠'));
  for (const category of categoryOrder) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'tab ' + (category === activeCategory ? 'active' : '');
    button.setAttribute('role', 'tab');
    button.setAttribute('aria-selected', category === activeCategory ? 'true' : 'false');
    button.disabled = !availableCategories.has(category);
    const count = items.filter(item => (item.category || '武侠') === category).length;
    button.textContent = `${category}预设 ${count}`;
    button.onclick = () => setCategory(category);
    tabs.appendChild(button);
  }
}
function rebuildTypeOptions() {
  const previous = type.value;
  type.textContent = '';
  const allOption = document.createElement('option');
  allOption.value = '';
  allOption.textContent = '全部类型';
  type.appendChild(allOption);
  const values = [...new Set(scopedItemsForActiveCategory().map(item => item.type))]
    .sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
  for (const value of values) {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value;
    type.appendChild(option);
  }
  type.value = values.includes(previous) ? previous : '';
}
function render() {
  const query = q.value.trim().toLowerCase();
  const typeFilter = type.value;
  const stateFilter = filter.value;
  const sourceFilter = source.value;
  grid.textContent = '';
  let shown = 0;
  const scopedItems = scopedItemsForActiveCategory();
  for (const item of scopedItems) {
    const key = itemKey(item);
    const mark = marks[key] || {};
    if (query && !item.name.toLowerCase().includes(query)) continue;
    if (typeFilter && item.type !== typeFilter) continue;
    if (sourceFilter && item.source !== sourceFilter) continue;
    if (stateFilter === 'problem' && !mark.problem) continue;
    if (stateFilter === 'todo' && mark.problem) continue;
    shown += 1;

    const card = el('article', 'card ' + (mark.problem ? 'problem' : ''));
    const imgbox = el('div', 'imgbox');
    const img = document.createElement('img');
    img.loading = 'eager';
    img.decoding = 'async';
    img.alt = item.name;
    img.title = '点击放大';
    img.style.cursor = 'zoom-in';
    img.onclick = () => openViewer(item);
    imgbox.appendChild(img);
    if (item.source === '远程图') imgbox.appendChild(el('span', 'badge', '远程图'));
    watchPresetImage(img, imgbox, item);

    const meta = el('div', 'meta');
    meta.appendChild(el('div', 'name', item.name));
    const tags = el('div', 'tags');
    tags.appendChild(el('span', 'tag', item.type));
    tags.appendChild(el('span', 'tag', item.quality));
    tags.appendChild(el('span', 'tag', item.source));
    meta.appendChild(tags);

    const note = document.createElement('textarea');
    note.className = 'note';
    note.placeholder = '这里写问题，例如：像盔甲不是鞋';
    note.value = mark.note || '';
    note.oninput = () => {
      marks[key] = { ...(marks[key] || {}), note: note.value };
      save();
    };
    meta.appendChild(note);

    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'mark ' + (mark.problem ? 'active' : '');
    button.textContent = mark.problem ? '已标问题' : '标为有问题';
    button.onclick = () => {
      marks[key] = { ...(marks[key] || {}), problem: !mark.problem, note: note.value };
      save();
      render();
    };
    meta.appendChild(button);
    card.appendChild(imgbox);
    card.appendChild(meta);
    grid.appendChild(card);
  }
  const problemCount = scopedItems.filter(item => (marks[itemKey(item)] || {}).problem).length;
  const remoteCount = scopedItems.filter(item => item.source === '远程图').length;
  stat.textContent = `${activeCategory}：显示 ${shown} / 共 ${scopedItems.length}；已标问题 ${problemCount}；远程图 ${remoteCount}`;
}
async function loadData() {
  const response = await fetch('./assets/item-preset-feedback-data.json', { cache: 'no-store' });
  if (!response.ok) throw new Error('反馈数据载入失败');
  items = await response.json();
  renderTabs();
  rebuildTypeOptions();
  render();
}
function setCategory(category) {
  if (!categoryOrder.includes(category)) return;
  activeCategory = category;
  [...tabs.querySelectorAll('.tab')].forEach((button) => {
    const isActive = button.textContent.startsWith(category);
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  rebuildTypeOptions();
  render();
}
async function submitFeedback() {
  const summary = document.getElementById('summary').value.trim();
  const payload = {
    reviewer: document.getElementById('reviewer').value.trim(),
    contact: document.getElementById('contact').value.trim(),
    summary,
    pageUrl: location.href,
    items: currentProblemItems()
  };
  if (!payload.summary && !payload.items.length) {
    showToast('请先标记至少一项并填写备注，或填写总体反馈。');
    return;
  }
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';
  try {
    const response = await fetch('/api/diagnostics/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        app: {
          name: 'MoRanJiangHu',
          feature: 'item-preset-feedback'
        },
        client: {
          reviewer: payload.reviewer,
          contact: payload.contact,
          pageUrl: payload.pageUrl,
          userAgent: navigator.userAgent,
          language: navigator.language
        },
        summary: {
          type: 'item-preset-feedback',
          summary: payload.summary,
          itemCount: payload.items.length
        },
        logs: payload.items.map(item => ({
          id: item.name,
          level: 'feedback',
          time: new Date().toISOString(),
          message: `${item.name}：${item.note}`,
          detail: JSON.stringify(item)
        }))
      })
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || !result.ok) throw new Error(result.error || '提交失败');
    showToast(`提交成功，反馈编号：${result.id}\n已提交问题项：${payload.items.length}`);
  } catch (error) {
    showToast(error.message || '提交失败，请稍后再试。');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '提交反馈';
  }
}
async function submitContribution() {
  const file = document.getElementById('contributionFile').files[0];
  const itemName = document.getElementById('contributionName').value.trim();
  const itemType = document.getElementById('contributionType').value;
  const quality = document.getElementById('contributionQuality').value;
  if (!itemName || !itemType || !quality || !file) {
    showToast('请填写名称、类型、品质，并选择一张图片。');
    return;
  }
  if (file.size > 8 * 1024 * 1024) {
    showToast('图片太大，请压缩到 8MB 以内。');
    return;
  }
  submitContributionBtn.disabled = true;
  submitContributionBtn.textContent = '提交中...';
  contributionStat.textContent = '';
  try {
    const imageDataUrl = await readFileAsDataUrl(file);
    const response = await fetch('/api/item-preset-contributions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        itemName,
        itemType,
        quality,
        contributor: document.getElementById('contributorName').value.trim(),
        contact: document.getElementById('contributorContact').value.trim(),
        note: document.getElementById('contributionNote').value.trim(),
        imageDataUrl,
        deviceId: getContributionDeviceId(),
        language: navigator.language
      })
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || !result.ok) throw new Error(result.error || '贡献提交失败');
    const message = `贡献成功，编号：${result.id}\n今日剩余可贡献：${result.remainingToday}`;
    contributionStat.textContent = message;
    showToast(message);
    document.getElementById('contributionFile').value = '';
    document.getElementById('contributionNote').value = '';
  } catch (error) {
    showToast(error.message || '贡献提交失败，请稍后再试。');
  } finally {
    submitContributionBtn.disabled = false;
    submitContributionBtn.textContent = '提交贡献图片';
  }
}
[q, type, filter, source].forEach(node => node.addEventListener('input', render));
submitBtn.addEventListener('click', submitFeedback);
toggleContributionBtn.addEventListener('click', () => {
  contributionPanel.classList.toggle('open');
});
submitContributionBtn.addEventListener('click', submitContribution);
document.getElementById('clearBtn').onclick = () => {
  if (confirm('确定清空当前浏览器里的标记？')) {
    marks = {};
    localStorage.removeItem(storageKey);
    render();
  }
};
viewerClose.onclick = closeViewer;
viewer.onclick = (event) => {
  if (event.target === viewer) closeViewer();
};
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeViewer();
});
loadData().catch(error => {
  stat.textContent = error.message || '载入失败';
  showToast(stat.textContent);
});
</script>
</body>
</html>
