<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线用户监控</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071013;
      --panel: rgba(9, 20, 24, 0.92);
      --line: rgba(148, 163, 184, 0.22);
      --text: #e5edf0;
      --muted: #91a0a6;
      --accent: #38bdf8;
      --good: #34d399;
      --bad: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 18% 12%, rgba(56, 189, 248, 0.18), transparent 34%), var(--bg);
      color: var(--text);
    }
    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.08em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.36);
    }
    .login {
      max-width: 460px;
      margin: 80px auto 0;
      padding: 22px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0,0,0,0.28);
      color: var(--text);
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: rgba(56, 189, 248, 0.7); }
    button {
      height: 38px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.12);
      color: #dff6ff;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
    }
    button:hover { background: rgba(56, 189, 248, 0.2); }
    .login button {
      width: 100%;
      margin-top: 14px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat {
      padding: 14px;
    }
    .stat small {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .stat strong {
      font-size: 26px;
    }
    .tableWrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 940px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th {
      color: #b7c6cc;
      font-size: 12px;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.03);
      position: sticky;
      top: 0;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      word-break: break-all;
    }
    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .hidden { display: none !important; }
    .message {
      margin-top: 12px;
      color: var(--bad);
      font-size: 13px;
      min-height: 20px;
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <section id="loginView" class="panel login">
      <h1>在线用户监控</h1>
      <p class="sub">输入管理密码后查看当前在线用户、IP 与最后在线时间。</p>
      <label for="password">管理密码</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="loginButton" type="button">进入管理页</button>
      <div id="loginMessage" class="message"></div>
    </section>

    <section id="dashboardView" class="hidden">
      <header>
        <div>
          <h1>在线用户监控</h1>
          <div class="sub">在线判定窗口默认 2 分钟；页面每 15 秒自动刷新一次。</div>
        </div>
        <div>
          <button id="refreshButton" type="button">刷新</button>
          <button id="logoutButton" type="button">退出</button>
        </div>
      </header>

      <div class="stats">
        <div class="panel stat"><small>当前在线</small><strong id="onlineCount">0</strong></div>
        <div class="panel stat"><small>最近会话</small><strong id="recentCount">0</strong></div>
        <div class="panel stat"><small>在线窗口</small><strong id="ttlSeconds">0s</strong></div>
        <div class="panel stat"><small>服务器时间</small><strong id="serverTime" style="font-size:14px">-</strong></div>
      </div>

      <div class="panel toolbar">
        <div id="statusText" class="muted">等待刷新</div>
        <div class="muted">路径：<span class="mono">/admin/online.html</span></div>
      </div>

      <div class="panel tableWrap">
        <table>
          <thead>
            <tr>
              <th>状态</th>
              <th>IP</th>
              <th>位置</th>
              <th>最后在线</th>
              <th>首次访问</th>
              <th>版本/平台</th>
              <th>路径</th>
              <th>User Agent</th>
            </tr>
          </thead>
          <tbody id="sessionRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const TOKEN_KEY = 'moranjianghu.onlineAdminToken';
    const loginView = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const refreshButton = document.getElementById('refreshButton');
    const logoutButton = document.getElementById('logoutButton');
    const loginMessage = document.getElementById('loginMessage');
    const statusText = document.getElementById('statusText');
    const sessionRows = document.getElementById('sessionRows');
    let refreshTimer = 0;

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    const formatTime = (value) => {
      const date = new Date(value || '');
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString();
    };

    const formatAgo = (value, serverTime) => {
      const date = new Date(value || '');
      const server = new Date(serverTime || Date.now());
      if (Number.isNaN(date.getTime())) return '-';
      const seconds = Math.max(0, Math.round((server.getTime() - date.getTime()) / 1000));
      if (seconds < 60) return `${seconds}s 前`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m 前`;
      return `${Math.floor(minutes / 60)}h 前`;
    };

    const setView = (loggedIn) => {
      loginView.classList.toggle('hidden', loggedIn);
      dashboardView.classList.toggle('hidden', !loggedIn);
    };

    const getToken = () => sessionStorage.getItem(TOKEN_KEY) || '';
    const setToken = (token) => sessionStorage.setItem(TOKEN_KEY, token);
    const clearToken = () => sessionStorage.removeItem(TOKEN_KEY);

    async function loadData() {
      const token = getToken();
      if (!token) {
        setView(false);
        return;
      }
      statusText.textContent = '刷新中...';
      const response = await fetch('/api/admin/online', {
        headers: { Authorization: `Bearer ${token}` },
        cache: 'no-store'
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.success) {
        clearToken();
        setView(false);
        loginMessage.textContent = response.status === 401 ? '密码错误或登录已失效。' : (data.error || '读取失败。');
        return;
      }
      renderData(data);
      setView(true);
    }

    function renderData(data) {
      document.getElementById('onlineCount').textContent = data.onlineCount || 0;
      document.getElementById('recentCount').textContent = data.totalRecentCount || 0;
      document.getElementById('ttlSeconds').textContent = `${data.ttlSeconds || 0}s`;
      document.getElementById('serverTime').textContent = formatTime(data.serverTime);
      statusText.textContent = `已刷新：${new Date().toLocaleTimeString()}`;
      const onlineIds = new Set((data.sessions || []).map((item) => item.id));
      const rows = (data.recentSessions || []).map((item) => {
        const location = [item.country, item.region, item.city, item.colo ? `(${item.colo})` : ''].filter(Boolean).join(' ');
        const online = onlineIds.has(item.id);
        return `<tr>
          <td class="${online ? 'good' : 'muted'}">${online ? '在线' : '离线'}</td>
          <td class="mono">${escapeHtml(item.ip || '-')}</td>
          <td>${escapeHtml(location || '-')}</td>
          <td>${escapeHtml(formatAgo(item.lastSeenAt, data.serverTime))}<br><span class="muted">${escapeHtml(formatTime(item.lastSeenAt))}</span></td>
          <td>${escapeHtml(formatTime(item.firstSeenAt))}</td>
          <td>${escapeHtml(item.versionName || '-')}${item.versionCode ? ` / ${escapeHtml(item.versionCode)}` : ''}<br><span class="muted">${escapeHtml(item.platform || '-')}</span></td>
          <td class="mono">${escapeHtml(item.path || '-')}</td>
          <td class="mono">${escapeHtml(item.userAgent || '-')}</td>
        </tr>`;
      }).join('');
      sessionRows.innerHTML = rows || '<tr><td colspan="8" class="muted">暂无会话</td></tr>';
    }

    async function login() {
      const password = passwordInput.value.trim();
      loginMessage.textContent = '';
      if (!password) {
        loginMessage.textContent = '请输入管理密码。';
        return;
      }
      setToken(password);
      await loadData();
      if (!dashboardView.classList.contains('hidden')) {
        passwordInput.value = '';
      }
    }

    loginButton.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    refreshButton.addEventListener('click', loadData);
    logoutButton.addEventListener('click', () => {
      clearToken();
      setView(false);
    });

    if (getToken()) {
      loadData();
    }
    refreshTimer = window.setInterval(() => {
      if (!dashboardView.classList.contains('hidden')) loadData();
    }, 15000);
    window.addEventListener('beforeunload', () => window.clearInterval(refreshTimer));
  </script>
</body>
</html>
