<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线用户监控</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071013;
      --panel: rgba(9, 20, 24, 0.92);
      --line: rgba(148, 163, 184, 0.22);
      --text: #e5edf0;
      --muted: #91a0a6;
      --accent: #38bdf8;
      --good: #34d399;
      --bad: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 18% 12%, rgba(56, 189, 248, 0.18), transparent 34%), var(--bg);
      color: var(--text);
    }
    main {
      width: min(1500px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.08em;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.36);
    }
    .login {
      max-width: 460px;
      margin: 80px auto 0;
      padding: 22px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0,0,0,0.28);
      color: var(--text);
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: rgba(56, 189, 248, 0.7); }
    button {
      height: 38px;
      border: 1px solid rgba(56, 189, 248, 0.45);
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.12);
      color: #dff6ff;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
    }
    button:hover { background: rgba(56, 189, 248, 0.2); }
    .login button {
      width: 100%;
      margin-top: 14px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .toolbarActions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #dbeafe;
      background: rgba(255,255,255,0.035);
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat {
      padding: 14px;
    }
    .stat small {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .stat strong {
      font-size: 26px;
    }
    .tableWrap {
      overflow: auto;
    }
    .sectionTitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 16px;
      margin-top: 14px;
      margin-bottom: 0;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom: 0;
    }
    .sectionTitle h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.1em;
    }
    .sectionTitle + .tableWrap {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1420px;
      table-layout: fixed;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th {
      color: #b7c6cc;
      font-size: 12px;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.03);
      position: sticky;
      top: 0;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      word-break: break-all;
    }
    .nowrap { white-space: nowrap; }
    .statusCell { font-weight: 800; }
    .locationCell { line-height: 1.45; }
    .imageCell strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .muted { color: var(--muted); }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .progress {
      width: 132px;
      height: 7px;
      margin: 7px 0 5px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.16);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--good));
    }
    .hidden { display: none !important; }
    .message {
      margin-top: 12px;
      color: var(--bad);
      font-size: 13px;
      min-height: 20px;
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <section id="loginView" class="panel login">
      <h1>在线用户监控</h1>
      <p class="sub">输入管理密码后查看当前在线用户、IP、本地图片与最后在线时间。</p>
      <label for="password">管理密码</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="loginButton" type="button">进入管理页</button>
      <div id="loginMessage" class="message"></div>
    </section>

    <section id="dashboardView" class="hidden">
      <header>
        <div class="toolbarActions">
          <h1>在线用户监控</h1>
          <div class="sub">在线判定窗口默认 2 分钟；页面每 15 秒自动刷新一次。</div>
        </div>
        <div>
          <label class="toggle" for="onlineOnly">
            <input id="onlineOnly" type="checkbox" />
            只看在线
          </label>
          <button id="refreshButton" type="button">刷新</button>
          <button id="logoutButton" type="button">退出</button>
        </div>
      </header>

      <div class="stats">
        <div class="panel stat"><small>当前在线</small><strong id="onlineCount">0</strong></div>
        <div class="panel stat"><small>最近用户</small><strong id="recentCount">0</strong></div>
        <div class="panel stat"><small>云端注册</small><strong id="cloudPlayUserCount">0</strong></div>
        <div class="panel stat"><small>服务器时间</small><strong id="serverTime" style="font-size:14px">-</strong></div>
      </div>

      <div class="panel toolbar">
        <div id="statusText" class="muted">等待刷新</div>
        <div class="muted">在线窗口 <span id="ttlSeconds">0s</span>；按登录账号或浏览会话统计用户</div>
      </div>

      <div class="panel sectionTitle">
        <h2>云端游玩注册情况</h2>
        <div class="muted">显示用户名、密码哈希、注册时间和云端存档清单</div>
      </div>
      <div class="panel tableWrap">
        <table style="min-width: 1540px">
          <colgroup>
            <col style="width: 150px" />
            <col style="width: 160px" />
            <col style="width: 320px" />
            <col style="width: 150px" />
            <col style="width: 150px" />
            <col style="width: 130px" />
            <col style="width: 230px" />
            <col style="width: 250px" />
          </colgroup>
          <thead>
            <tr>
              <th>用户名</th>
              <th>用户ID</th>
              <th>密码哈希</th>
              <th>注册时间</th>
              <th>更新时间</th>
              <th>存档数量</th>
              <th>最新存档</th>
              <th>清单地址</th>
            </tr>
          </thead>
          <tbody id="cloudPlayRows"></tbody>
        </table>
      </div>

      <div class="panel sectionTitle">
        <h2>在线用户</h2>
        <div class="muted">最近访问、版本、设备和图床迁移状态</div>
      </div>
      <div class="panel tableWrap">
        <table>
          <colgroup>
            <col style="width: 64px" />
            <col style="width: 130px" />
            <col style="width: 190px" />
            <col style="width: 150px" />
            <col style="width: 150px" />
            <col style="width: 92px" />
            <col style="width: 126px" />
            <col style="width: 118px" />
            <col style="width: 118px" />
            <col style="width: 200px" />
            <col style="width: 282px" />
          </colgroup>
          <thead>
            <tr>
              <th>状态</th>
              <th>IP</th>
              <th>位置</th>
              <th>最后在线</th>
              <th>首次访问</th>
              <th>会话</th>
              <th>版本/平台</th>
              <th>本地图片</th>
              <th>远程图片</th>
              <th>迁移进度</th>
              <th>User Agent</th>
            </tr>
          </thead>
          <tbody id="sessionRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const TOKEN_KEY = 'moranjianghu.onlineAdminToken';
    const loginView = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginButton');
    const refreshButton = document.getElementById('refreshButton');
    const logoutButton = document.getElementById('logoutButton');
    const onlineOnly = document.getElementById('onlineOnly');
    const loginMessage = document.getElementById('loginMessage');
    const statusText = document.getElementById('statusText');
    const sessionRows = document.getElementById('sessionRows');
    const cloudPlayRows = document.getElementById('cloudPlayRows');
    let refreshTimer = 0;

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char]));

    const formatTime = (value) => {
      const date = new Date(value || '');
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString();
    };

    const formatAgo = (value, serverTime) => {
      const date = new Date(value || '');
      const server = new Date(serverTime || Date.now());
      if (Number.isNaN(date.getTime())) return '-';
      const seconds = Math.max(0, Math.round((server.getTime() - date.getTime()) / 1000));
      if (seconds < 60) return `${seconds}s 前`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m 前`;
      return `${Math.floor(minutes / 60)}h 前`;
    };

    const countryNames = typeof Intl !== 'undefined' && Intl.DisplayNames
      ? new Intl.DisplayNames(['zh-CN'], { type: 'region' })
      : null;

    const regionNameMap = {
      Zhejiang: '浙江',
      Guangdong: '广东',
      Shandong: '山东',
      California: '加利福尼亚',
      Tokyo: '东京',
      'Hong Kong': '香港',
      Singapore: '新加坡'
    };

    const cityNameMap = {
      Hangzhou: '杭州',
      Qingdao: '青岛',
      Shenzhen: '深圳',
      'Los Angeles': '洛杉矶',
      Tokyo: '东京',
      'Hong Kong': '香港',
      Singapore: '新加坡'
    };

    const translateCountry = (country) => {
      const code = String(country || '').trim();
      if (!code) return '';
      const direct = {
        CN: '中国',
        US: '美国',
        JP: '日本',
        HK: '中国香港',
        SG: '新加坡',
        TW: '中国台湾',
        MO: '中国澳门'
      }[code.toUpperCase()];
      if (direct) return direct;
      try {
        return countryNames?.of(code.toUpperCase()) || code;
      } catch {
        return code;
      }
    };

    const translatePlace = (value, map) => {
      const text = String(value || '').trim();
      return text ? (map[text] || text) : '';
    };

    const formatLocation = (item) => {
      const country = translateCountry(item.country);
      const region = translatePlace(item.region, regionNameMap);
      const city = translatePlace(item.city, cityNameMap);
      const main = [country, region, city].filter(Boolean).join(' · ');
      const details = [item.timezone ? `时区：${item.timezone}` : '', item.colo ? `节点：${item.colo}` : ''].filter(Boolean).join('；');
      if (!main && !details) return '-';
      return `${escapeHtml(main || '-')}${details ? `<br><span class="muted">${escapeHtml(details)}</span>` : ''}`;
    };

    const formatBytes = (value) => {
      const bytes = Number(value || 0);
      if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      let size = bytes;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size >= 10 || unitIndex === 0 ? size.toFixed(0) : size.toFixed(2)} ${units[unitIndex]}`;
    };

    const shortHash = (value) => {
      const text = String(value || '');
      if (text.length <= 24) return text || '-';
      return `${text.slice(0, 16)}…${text.slice(-8)}`;
    };

    const migrationStageText = (stage) => ({
      idle: '等待扫描',
      scanning: '扫描中',
      running: '迁移中',
      completed: '已完成',
      partial_failed: '部分失败',
      failed: '失败'
    }[stage] || '未知');

    const renderMigration = (status) => {
      if (!status || typeof status !== 'object') return '<span class="muted">暂无上报</span>';
      const total = Number(status.totalAssets || 0);
      const processed = Number(status.processedAssets || 0);
      const percent = total > 0 ? Math.max(0, Math.min(100, Math.round((processed / total) * 100))) : (status.stage === 'completed' ? 100 : 0);
      const failed = Number(status.failedAssets || 0);
      const migrated = Number(status.migratedAssets || 0);
      return `${escapeHtml(migrationStageText(status.stage))}
        <div class="progress" title="${escapeHtml(percent)}%"><span style="width:${percent}%"></span></div>
        <span class="muted">${escapeHtml(total > 0 ? `${processed}/${total}` : '-')}，已迁移 ${escapeHtml(migrated)}，失败 ${escapeHtml(failed)}</span>`;
    };

    const setView = (loggedIn) => {
      loginView.classList.toggle('hidden', loggedIn);
      dashboardView.classList.toggle('hidden', !loggedIn);
    };

    const getToken = () => sessionStorage.getItem(TOKEN_KEY) || '';
    const setToken = (token) => sessionStorage.setItem(TOKEN_KEY, token);
    const clearToken = () => sessionStorage.removeItem(TOKEN_KEY);

    let consecutiveLoadFailures = 0;

    async function loadData() {
      const token = getToken();
      if (!token) {
        setView(false);
        return;
      }
      statusText.textContent = '刷新中...';
      try {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 12000);
        const response = await fetch('/api/admin/online', {
          headers: { Authorization: `Bearer ${token}` },
          cache: 'no-store',
          signal: controller.signal
        });
        window.clearTimeout(timeout);
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          if (response.status === 401) {
            clearToken();
            setView(false);
            loginMessage.textContent = '密码错误或登录已失效。';
            return;
          }
          consecutiveLoadFailures += 1;
          statusText.textContent = `刷新失败（${consecutiveLoadFailures}）：${data.error || response.status || '网络异常'}，保留当前列表。`;
          return;
        }
        consecutiveLoadFailures = 0;
        renderData(data);
        setView(true);
      } catch (error) {
        consecutiveLoadFailures += 1;
        statusText.textContent = `刷新失败（${consecutiveLoadFailures}）：${error && error.name === 'AbortError' ? '请求超时' : '网络中断'}，保留当前列表。`;
      }
    }

    function renderData(data) {
      document.getElementById('onlineCount').textContent = data.onlineCount || 0;
      document.getElementById('recentCount').textContent = data.totalRecentCount || 0;
      document.getElementById('cloudPlayUserCount').textContent = data.cloudPlayUserCount || 0;
      document.getElementById('ttlSeconds').textContent = `${data.ttlSeconds || 0}s`;
      document.getElementById('serverTime').textContent = formatTime(data.serverTime);
      statusText.textContent = `已刷新：${new Date().toLocaleTimeString()}`;
      renderCloudPlayUsers(data.cloudPlayUsers || []);
      const onlineIds = new Set((data.users || data.sessions || []).map((item) => item.id));
      const sourceRows = onlineOnly.checked ? (data.users || data.sessions || []) : (data.recentUsers || data.recentSessions || []);
      const rows = sourceRows.map((item) => {
        const online = Boolean(item.online) || onlineIds.has(item.id);
        const imageStats = item.imageStats || {};
        const userAgents = Array.isArray(item.userAgents) ? item.userAgents : [item.userAgent].filter(Boolean);
        return `<tr>
          <td class="statusCell ${online ? 'good' : 'muted'}">${online ? '在线' : '离线'}</td>
          <td class="mono">${escapeHtml(item.ip || '-')}</td>
          <td class="locationCell">${formatLocation(item)}</td>
          <td>${escapeHtml(formatAgo(item.lastSeenAt, data.serverTime))}<br><span class="muted">${escapeHtml(formatTime(item.lastSeenAt))}</span></td>
          <td>${escapeHtml(formatTime(item.firstSeenAt))}</td>
          <td class="nowrap">${escapeHtml(item.sessionCount || 1)} 个<br><span class="muted">${escapeHtml(item.heartbeatCount || 0)} 次</span></td>
          <td>${escapeHtml(item.versionName || '-')}${item.versionCode ? ` / ${escapeHtml(item.versionCode)}` : ''}<br><span class="muted">${escapeHtml(item.platform || '-')}</span></td>
          <td class="imageCell"><strong>${escapeHtml(imageStats.localImageAssets || 0)} 张</strong><span class="muted">${escapeHtml(formatBytes(imageStats.localImageBytes || 0))}</span></td>
          <td class="imageCell"><strong>${escapeHtml(imageStats.remoteImageAssets || 0)} 张</strong><span class="muted">图床链接</span></td>
          <td>${renderMigration(imageStats.migrationStatus)}</td>
          <td class="mono">${escapeHtml(userAgents.join('\n') || '-')}</td>
        </tr>`;
      }).join('');
      sessionRows.innerHTML = rows || '<tr><td colspan="11" class="muted">暂无用户</td></tr>';
    }

    function renderCloudPlayUsers(users) {
      const rows = users.map((item) => {
        const summary = item.saveSummary || {};
        const saveText = summary.manifestError
          ? `<span class="bad">${escapeHtml(summary.manifestError)}</span>`
          : `<strong>${escapeHtml(summary.saveCount || 0)}</strong> 个<br><span class="muted">手动 ${escapeHtml(summary.manualCount || 0)} / 自动 ${escapeHtml(summary.autoCount || 0)}</span>`;
        const latestText = summary.latestSavedAt
          ? `${escapeHtml(formatTime(summary.latestSavedAt))}<br><span class="muted">${escapeHtml(summary.latestTitle || '未知角色')} · ${escapeHtml(summary.latestLocation || '未知地点')}</span>`
          : '<span class="muted">暂无存档</span>';
        const manifestText = item.manifestUrl
          ? `${escapeHtml(shortHash(item.manifestUrl))}<br><span class="muted">${escapeHtml(formatTime(summary.manifestUpdatedAt || item.manifestUpdatedAt))}</span>`
          : '<span class="muted">暂无清单</span>';
        return `<tr>
          <td><strong>${escapeHtml(item.username || '-')}</strong><br><span class="muted mono">${escapeHtml(item.usernameKey || '-')}</span></td>
          <td class="mono">${escapeHtml(item.userId || '-')}</td>
          <td class="mono" title="${escapeHtml(item.passwordHash || '')}">${escapeHtml(shortHash(item.passwordHash))}</td>
          <td>${escapeHtml(formatTime(item.createdAt))}</td>
          <td>${escapeHtml(formatTime(item.updatedAt))}</td>
          <td>${saveText}</td>
          <td>${latestText}</td>
          <td class="mono" title="${escapeHtml(item.manifestUrl || '')}">${manifestText}</td>
        </tr>`;
      }).join('');
      cloudPlayRows.innerHTML = rows || '<tr><td colspan="8" class="muted">暂无云端注册用户，或云端游玩 R2 未配置。</td></tr>';
    }

    async function login() {
      const password = passwordInput.value.trim();
      loginMessage.textContent = '';
      if (!password) {
        loginMessage.textContent = '请输入管理密码。';
        return;
      }
      setToken(password);
      await loadData();
      if (!dashboardView.classList.contains('hidden')) {
        passwordInput.value = '';
      }
    }

    loginButton.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    refreshButton.addEventListener('click', loadData);
    onlineOnly.addEventListener('change', loadData);
    logoutButton.addEventListener('click', () => {
      clearToken();
      setView(false);
    });

    if (getToken()) {
      loadData();
    }
    refreshTimer = window.setInterval(() => {
      if (!dashboardView.classList.contains('hidden')) loadData();
    }, 15000);
    window.addEventListener('beforeunload', () => window.clearInterval(refreshTimer));
  </script>
</body>
</html>
