
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨色江湖</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./styles/root-theme.css" />
    <link rel="stylesheet" href="./styles/global.css" />
  <script>
    (function () {
      var maxLogs = 200;
      var logs = [];
      var overlay = null;
      window.__MORAN_PREBOOT_LOGS__ = logs;

      function stringify(value) {
        if (value instanceof Error) {
          return value.name + ': ' + value.message + (value.stack ? '\n' + value.stack : '');
        }
        if (typeof value === 'string') return value;
        try {
          return JSON.stringify(value);
        } catch (error) {
          return String(value);
        }
      }

      function push(level, values) {
        logs.push({
          level: level,
          time: new Date().toISOString(),
          values: Array.prototype.slice.call(values || []).map(stringify)
        });
        if (logs.length > maxLogs) logs.splice(0, logs.length - maxLogs);
      }

      function isExternalInjectedError(event) {
        var filename = String(event && event.filename || '');
        var message = String(event && event.message || '');
        var stack = stringify(event && event.error || '');
        var source = [filename, message, stack].join('\n');
        var hasNoLocation = !filename && !event.lineno && !event.colno;
        var hasNoErrorObject = !event.error;
        if (message === 'Script error.' && hasNoLocation && hasNoErrorObject) return true;
        if (/^(chrome|moz|safari-web)-extension:\/\//i.test(filename)) return true;
        if (/chrome-extension:\/\//i.test(source)) return true;
        if (/Failed to execute 'appendChild' on 'Node': Invalid regular expression/i.test(source)) return true;
        return false;
      }

      function isRecoverableNetworkRejection(reason) {
        var text = stringify(reason);
        return /NetworkError when attempting to fetch resource|Failed to fetch|Load failed|The Internet connection appears to be offline|Network request failed/i.test(text);
      }

      function showOverlay() {
        if (!document.body) return;
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = 'moran-preboot-error-overlay';
          overlay.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:999999',
            'overflow:auto',
            'background:rgba(5,5,5,.96)',
            'color:#ffe7b8',
            'font-family:ui-monospace,SFMono-Regular,Consolas,monospace',
            'font-size:12px',
            'line-height:1.6',
            'padding:16px',
            'white-space:pre-wrap',
            'word-break:break-word'
          ].join(';');
          document.body.appendChild(overlay);
        }
        overlay.textContent = [
          '应用启动失败。请把下面的诊断信息发给维护人员：',
          '',
          logs.map(function (entry) {
            return '[' + entry.time + '] [' + entry.level + '] ' + (entry.values || []).join('\n');
          }).join('\n\n')
        ].join('\n');
      }

      window.addEventListener('error', function (event) {
        if (isExternalInjectedError(event)) {
          push('warn', [
            'preboot ignored external script error',
            event.message,
            event.filename ? event.filename + ':' + event.lineno + ':' + event.colno : '',
            event.error
          ]);
          return;
        }
        push('error', [
          'preboot window.error',
          event.message,
          event.filename ? event.filename + ':' + event.lineno + ':' + event.colno : '',
          event.error
        ]);
        showOverlay();
      });

      window.addEventListener('unhandledrejection', function (event) {
        if (isRecoverableNetworkRejection(event.reason)) {
          push('warn', ['preboot recoverable network rejection', event.reason]);
          if (event && typeof event.preventDefault === 'function') event.preventDefault();
          return;
        }
        push('error', ['preboot unhandledrejection', event.reason]);
        showOverlay();
      });

      ['error', 'warn'].forEach(function (level) {
        var original = console[level];
        if (typeof original !== 'function') return;
        console[level] = function () {
          push(level, arguments);
          return original.apply(console, arguments);
        };
      });
    })();
  </script>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var state = (params.get('state') || '').trim();
        var hasOAuthResult = Boolean((params.get('code') || params.get('error')) && state);
        if (hasOAuthResult && state.indexOf('native:') === 0) {
          window.location.replace('com.moranjianghu.game://oauth/github/callback' + window.location.search);
        }
      } catch (error) {
        // Best-effort OAuth bridge; the app can continue normal startup.
      }
    })();
  </script>
